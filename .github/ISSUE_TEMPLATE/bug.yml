name: 🐛 Bug report
description: Something is broken
labels: ['bug', 'needs-triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please fill in as much as you can.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of the bug
      placeholder: SSE reconnection loops on Safari iOS 17 when going from cellular to Wi-Fi
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app on Safari iOS
        2. Start a feed timer
        3. Switch from Wi-Fi to cellular
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v0.1.0 or commit hash
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: macOS 26, Chrome 142 / iOS 17.4, Safari
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Console output, server logs, screenshots — anything that helps

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for duplicates
          required: true
        - label: I'm running a supported version (latest main or latest release)
          required: true
